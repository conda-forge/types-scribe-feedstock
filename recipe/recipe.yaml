# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.0"

package:
  name: types-scribe
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-scribe/types-scribe-${{ version }}.tar.gz
  sha256: c302f6ae55a1d9a5f4c83754deccf85674cf6807683b2df5e66be41a1f2a2655

build:
  number: 2
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - types-fb303

tests:
  - package_contents:
      site_packages:
        - scribe-python2-stubs/__init__.pyi
  - python:
      imports: []
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/python/typeshed
  repository: https://github.com/python/typeshed
  summary: Typing stubs for scribe
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
